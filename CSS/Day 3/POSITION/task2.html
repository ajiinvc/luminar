<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task 2</title>
    <style>
        * {
            padding: 0%;
            margin: 0%;
        }

        .main {
            width: 100%;
            height: 100%;
        }

        .row {
            display: flex;
            justify-content: center;
        }

        .item {
            width: 150px;
            height: 200px;
            margin: 10px;
        }

        h1 {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-weight: bolder;
            font-style: italic;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="main">
        <h1>Spectrum V Ellsworth Kelly</h1>

        <div class="row">
            <div class="item" style="background-color: grey;"></div>
            <div class="item" style="background-color: green;"></div>
            <div class="item" style="background-color: lightgreen;"></div>
            <div class="item" style="background-color: greenyellow;"></div>
            <div class="item" style="background-color: rgb(213, 207, 207);"></div>
        </div>

        <div class="row">
            <div class="item" style="background-color: orange;"></div>
            <div class="item" style="background-color: orangered;"></div>
            <div class="item" style="background-color: pink;"></div>
            <div class="item" style="background-color: violet;"></div>
            <div class="item" style="background-color: blueviolet;"></div>
            <div class="item" style="background-color: rgb(147, 96, 195);"></div>
            <div class="item" style="background-color: aqua;"></div>
        </div>

        <div class="row">
            <div class="item" style="background-color: rgb(226, 226, 216);"></div>
            <div class="item" style="background-color: bisque;"></div>
            <div class="item" style="background-color: wheat;"></div>
            <div class="item" style="background-color: rgb(158, 146, 146);"></div>
            <div class="item" style="background-color: rgb(90, 174, 174);"></div>
            <div class="item" style="background-color: chocolate;"></div>
            <div class="item" style="background-color: aquamarine;"></div>
            <div class="item" style="background-color: rgb(190, 190, 74);"></div>
            <div class="item" style="background-color: yellow;"></div>
        </div>
    </div>
</body>

</html>
